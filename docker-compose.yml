version: "3.9"

services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      mssql_user: ${MSSQL_USER}
      mssql_password: ${MSSQL_PASSWORD}
      mssql_host: ${MSSQL_HOST}
      mssql_dbname: ${MSSQL_DBNAME}
      mssql_port: ${MSSQL_PORT}
      openai_api_key: ${OPENAI_API_KEY}
      allow_origins: ${ALLOW_ORIGINS}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://backend:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    expose:
      - "8000"
    networks: [eventnet]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_HOST_URL: ${NEXT_PUBLIC_HOST_URL:-http://localhost}
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_HOST_URL: ${NEXT_PUBLIC_HOST_URL:-http://localhost}
    depends_on: [backend]
    expose:
      - "3000"
    networks: [eventnet]
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [eventnet]
    restart: unless-stopped

networks:
  eventnet:
    driver: bridge
    
