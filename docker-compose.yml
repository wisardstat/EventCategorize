version: "3.9"

services:
  frontend:
    build: ./frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://host.docker.internal:8000}
      NEXT_PUBLIC_HOST_URL: ${NEXT_PUBLIC_HOST_URL:-http://localhost:80}
    ports: ["80:3000"]
    networks: [eventnet]
    restart: unless-stopped

networks:
  eventnet: {}
